services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: rag-compliance-evaluator
    image: rag-compliance-evaluator:local
    security_opt:
      - no-new-privileges:true
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
    env_file:
      - .env
    ports:
      - "8080:8080"
    # depends_on:
    #   postgres:
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]    
    #   interval: 60s
    #   timeout: 3s
    #   retries: 3
    #   start_period: 10s

  ollama:
    image: ollama/ollama
    container_name: ollama_llm
    security_opt:
      - no-new-privileges:true
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


