<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 130" role="img" aria-label="Text to embedding vector: transformer mean pooling">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#4a4f6a"/>
    </marker>
  </defs>

  <!-- Input text box -->
  <rect x="10" y="30" width="210" height="50" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="115" y="53" fill="#e2e8f0" font-size="12" font-family="sans-serif" text-anchor="middle">"What is the notice period</text>
  <text x="115" y="69" fill="#e2e8f0" font-size="12" font-family="sans-serif" text-anchor="middle">in Germany?"</text>

  <!-- Arrow -->
  <line x1="220" y1="55" x2="253" y2="55" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transformer box -->
  <rect x="255" y="10" width="175" height="90" rx="6" fill="#3b5bdb22" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="342" y="45" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">6-layer Transformer</text>
  <text x="342" y="62" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">mean pooling</text>
  <text x="342" y="88" fill="#a0aec0" font-size="10" font-family="sans-serif" text-anchor="middle" font-style="italic">contrastive loss on sentence pairs</text>

  <!-- Arrow -->
  <line x1="430" y1="55" x2="463" y2="55" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output vector box -->
  <rect x="465" y="10" width="205" height="90" rx="6" fill="#252840" stroke="#4ade80" stroke-width="1.5"/>
  <text x="567" y="38" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">v ∈ ℝ³⁸⁴</text>
  <text x="567" y="58" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">[0.21, -0.07, 0.44, …]</text>
  <text x="567" y="85" fill="#a0aec0" font-size="10" font-family="sans-serif" text-anchor="middle">384-dimensional dense vector</text>
</svg>
