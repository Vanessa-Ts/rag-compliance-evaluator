<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 860 140" role="img" aria-label="Evaluation pipeline overview">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#4a4f6a"/>
    </marker>
  </defs>

  <!-- Golden Q&A box -->
  <rect x="10" y="40" width="140" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="80" y="63" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Golden Q&amp;A</text>
  <text x="80" y="80" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">(qa.yaml)</text>

  <!-- Arrow -->
  <line x1="150" y1="67" x2="183" y2="67" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RAG Pipeline box -->
  <rect x="185" y="40" width="165" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="267" y="63" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">RAG Pipeline</text>
  <text x="267" y="80" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">retrieve + generate</text>

  <!-- Arrow -->
  <line x1="350" y1="67" x2="383" y2="67" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Metrics Engine box -->
  <rect x="385" y="40" width="145" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="457" y="67" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Metrics Engine</text>

  <!-- Forking arrows to two branches -->
  <!-- Upper branch arrow -->
  <path d="M530 55 L575 55 L575 28 L613 28" stroke="#4a4f6a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- Lower branch arrow -->
  <path d="M530 79 L575 79 L575 108 L613 108" stroke="#4a4f6a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Upper branch: Rule-based metrics -->
  <rect x="615" y="10" width="230" height="48" rx="6" fill="#1a1d2e" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="730" y="31" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Rule-based</text>
  <text x="730" y="47" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">precision@k  hit@k  p95</text>

  <!-- Lower branch: LLM-as-judge -->
  <rect x="615" y="88" width="230" height="48" rx="6" fill="#1a1d2e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="730" y="109" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">LLM-as-judge</text>
  <text x="730" y="125" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">faithfulness  ctx relevance</text>
</svg>
