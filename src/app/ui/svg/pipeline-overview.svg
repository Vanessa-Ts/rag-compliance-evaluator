<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 260" role="img" aria-label="RAG pipeline: offline indexing and online query phases">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#4a4f6a"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- OFFLINE label -->
  <text x="10" y="30" fill="#fb923c" font-size="11" font-family="sans-serif" font-weight="600">OFFLINE INDEXING</text>

  <!-- Offline: Corpus box -->
  <rect x="20" y="40" width="110" height="60" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="75" y="66" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Corpus</text>
  <text x="75" y="83" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">7 .md docs</text>

  <!-- Arrow → Chunker -->
  <line x1="130" y1="70" x2="163" y2="70" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Offline: Chunker box -->
  <rect x="165" y="40" width="150" height="60" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="240" y="63" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Chunker</text>
  <text x="240" y="79" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">800 tok / 120 overlap</text>

  <!-- Arrow → Embedder -->
  <line x1="315" y1="70" x2="353" y2="70" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Offline: Embedder box -->
  <rect x="355" y="40" width="155" height="60" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="432" y="63" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Embedder</text>
  <text x="432" y="79" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">all-MiniLM-L6-v2  ℝ³⁸⁴</text>

  <!-- Arrow → ChromaDB -->
  <line x1="510" y1="70" x2="548" y2="70" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Offline: ChromaDB cylinder -->
  <rect x="550" y="40" width="120" height="60" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <ellipse cx="610" cy="40" rx="60" ry="10" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="610" y="67" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">ChromaDB</text>
  <text x="610" y="83" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">HNSW index</text>

  <!-- Dashed divider line -->
  <line x1="448" y1="5" x2="448" y2="255" stroke="#4a4f6a" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="452" y="135" fill="#4a4f6a" font-size="10" font-family="sans-serif">index boundary</text>

  <!-- ONLINE label -->
  <text x="10" y="155" fill="#4ade80" font-size="11" font-family="sans-serif" font-weight="600">ONLINE QUERY</text>

  <!-- Online: User question box -->
  <rect x="20" y="165" width="110" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="75" y="189" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">User</text>
  <text x="75" y="206" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">question</text>

  <!-- Arrow → Online Embedder -->
  <line x1="130" y1="192" x2="163" y2="192" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Online: Embedder box (dashed border = shared model) -->
  <rect x="165" y="165" width="110" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="220" y="189" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Embedder</text>
  <text x="220" y="206" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">ℝ³⁸⁴</text>

  <!-- Arrow → ANN search -->
  <line x1="275" y1="192" x2="323" y2="192" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Online: ANN search box -->
  <rect x="325" y="165" width="120" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="385" y="189" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">ANN search</text>
  <text x="385" y="206" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">top-k = 4</text>

  <!-- Cross-row arrow: ChromaDB → ANN search -->
  <path d="M610 100 L610 145 L385 145 L385 165" stroke="#4a4f6a" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Arrow → LLM -->
  <line x1="445" y1="192" x2="493" y2="192" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Online: LLM box -->
  <rect x="495" y="165" width="135" height="55" rx="6" fill="#252840" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="562" y="189" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">LLM</text>
  <text x="562" y="206" fill="#a0aec0" font-size="11" font-family="sans-serif" text-anchor="middle">(chain-of-thought)</text>

  <!-- Arrow → Answer -->
  <line x1="630" y1="192" x2="668" y2="192" stroke="#4a4f6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Online: Answer box -->
  <rect x="670" y="165" width="110" height="55" rx="6" fill="#252840" stroke="#4ade80" stroke-width="1.5"/>
  <text x="725" y="189" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Answer +</text>
  <text x="725" y="206" fill="#e2e8f0" font-size="13" font-family="sans-serif" text-anchor="middle">Citations</text>
</svg>
